<svg xmlns="http://www.w3.org/2000/svg" width="240" height="30" role="img">
  <title>今天又是躺平的一天！</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#1a1a33"/>
    </linearGradient>
  </defs>
  <style>
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-2px); }
    }
    @keyframes star-flicker {
      0%, 100% { opacity: 0.8; }
      50% { opacity: 0.2; }
    }
    @keyframes scroll-text {
      0% { transform: translateX(100%); }
      100% { transform: translateX(-100%); }
    }

    .star {
      animation: star-flicker 2s infinite;
    }
    .emoji {
      animation: bounce 1.2s ease-in-out infinite;
    }
    .text:hover {
      fill: #4183c4;
      cursor: pointer;
    }
    .scrolling-text {
      font-size: 8px;
      fill: #ccc;
      animation: scroll-text 12s linear infinite;
    }
  </style>

  <!-- 背景 -->
  <rect x="0" y="0" width="240" height="30" fill="url(#bg)" />

  <!-- 星星 -->
  <circle class="star" cx="10" cy="5" r="1" fill="#fff" />
  <circle class="star" cx="50" cy="10" r="1.2" fill="#fff" />
  <circle class="star" cx="120" cy="4" r="1.4" fill="#fff" />
  <circle class="star" cx="180" cy="8" r="1" fill="#fff" />
  <circle class="star" cx="220" cy="6" r="1.1" fill="#fff" />

  <!-- 可爱表情 -->
  <text class="emoji" id="emoji" x="20" y="20" font-size="12" font-family="monospace" fill="#fff">(๑≧◡≦)๑</text>

  <!-- 主文字 -->
  <text class="text" x="100" y="20" font-size="12" font-family="Helvetica, sans-serif" font-weight="bold" fill="#fff">放学啦</text>

  <!-- 滚动字幕 -->
  <text class="scrolling-text" x="0" y="29">💤 躺平进行中 · 躺平进行中 · 躺平进行中 ·</text>
</svg>
