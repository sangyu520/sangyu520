<svg xmlns="http://www.w3.org/2000/svg" width="108" height="20" role="img" aria-label="桑榆-放学啦">
  <title>桑榆-放学啦</title>
  <style>
    a:hover #llink { fill: url(#b); stroke: #ccc }
    a:hover #rlink { fill: #4183c4 }
  </style>
  <linearGradient id="a" x2="0" y2="100%">
    <stop offset="0" stop-color="#fcfcfc" stop-opacity="0"/>
    <stop offset="1" stop-opacity=".1"/>
  </linearGradient>
  <linearGradient id="b" x2="0" y2="100%">
    <stop offset="0" stop-color="#ccc" stop-opacity=".1"/>
    <stop offset="1" stop-opacity=".1"/>
  </linearGradient>
  <g stroke="#d5d5d5">
    <rect stroke="none" fill="#fcfcfc" x="0.5" y="0.5" width="60" height="19" rx="2"/>
    <rect x="66.5" y="0.5" width="41" height="19" rx="2" fill="#fafafa"/>
    <rect x="66" y="7.5" width="0.5" height="5" stroke="#fafafa"/>
    <path d="M66.5 6.5 l-3 3v1 l3 3" stroke="d5d5d5" fill="#fafafa"/>
  </g>

  <!-- 替换图标为动漫风猫咪头像 -->
  <image x="5" y="3" width="14" height="14" xlink:href="data:image/svg+xml;base64," />

  <g aria-hidden="true" fill="#333" text-anchor="middle" font-family="Helvetica Neue,Helvetica,Arial,sans-serif" text-rendering="geometricPrecision" font-weight="700" font-size="110px" line-height="14px">
    <rect id="llink" stroke="#d5d5d5" fill="url(#a)" x=".5" y=".5" width="60" height="19" rx="2"/>
    <text aria-hidden="true" x="385" y="150" fill="#fff" transform="scale(.1)" textLength="330">桑榆</text>
    <text x="385" y="140" transform="scale(.1)" textLength="330">桑榆</text>
    <text aria-hidden="true" x="865" y="150" fill="#fff" transform="scale(.1)" textLength="330">放学啦</text>
    <text id="rlink" x="865" y="140" transform="scale(.1)" textLength="330">放学啦</text>
  </g>
</svg>
